<section class="flex justify-center items-center flex-col gap-9">
    <h2 class="text-4xl font-semibold">Complete the steps</h2>
    <h3> {{ currentLevel() }} / 3 </h3>
    <div class="stages bg-1 p-7 text-center shadow-2xl shadow-gray-700 rounded-lg border-2">
        @if (currentLevel() == 1) {
        <app-select-images (nextLevel)="handleLevel($event)" (nbOfFails)="incrementNbOfFails()" />
        } @else if (currentLevel() == 2) {
        <app-calcul (nextLevel)="handleLevel($event)" (nbOfFails)="incrementNbOfFails()" />
        } @else if ((currentLevel() == 3)) {
        <app-text-captcha (nextLevel)="handleLevel($event)" (nbOfFails)="incrementNbOfFails()" />
        }
    </div>
</section>
