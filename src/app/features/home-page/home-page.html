<section class="flex justify-center items-center flex-col gap-10 w-full m-auto text-center lg:w-2/6">
    <h1 class="text-3xl sm:text-5xl font-bold">ANGUL <span class="text-3">IT</span></h1>
    <p class="max-sm:text-xs">interactive multi-stage CAPTCHA web application called Angul-It, designed to test and
        enhance user validation
        mechanisms through engaging visual and logical challenges</p>
    <div class="flex gap-5 max-sm:flex-col">
        <button (click)="navigateToCaptchaPage(1)"
            class="w-35 text-4 font-semibold start-btn rounded-md bg-2 cursor-pointer">
            <span>Start</span>
        </button>
        <button (click)="navigateToCaptchaPage()"
            class="w-35 text-4 font-semibold start-btn rounded-md bg-2 cursor-pointer">
            <span>Resume</span>
        </button>
    </div>
    @if (isStagesDone()) {
    <button routerLink="/result" class="w-35 -mt-5 text-4 font-semibold start-btn rounded-md bg-2 cursor-pointer">
        <span>Last result</span>
    </button>
    }
</section>
