<section animate.enter="enter-animation">
    <form class="h-110 flex flex-col justify-between" (submit)="onSubmit($event)" (reset)="handlePrevious()">
        <div class="pt-25">
            <h2 class="text-2xl md:text-5xl mb-5 font-semibold text-3">{{ randomText() }}</h2>
            <input autofocus [formControl]="form" class="mt-10 w-full md:w-70 p-3 bg-2 rounded-lg text-xl outline-none shadow-2xl"
                type="text">
        </div>
        @if (form.invalid) {
        <app-error-alert [message]="form.getError('error')" />
        }
        <app-navigate-button />
    </form>
</section>
