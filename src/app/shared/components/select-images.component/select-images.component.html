<section class="h-full">
    <h3 class="title mb-7 text-sm md:text-lg"><span>Select all images with cats</span></h3>
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col justify-between h-full gap-10">
        <div class="grid grid-cols-2 md:grid-cols-3 place-items-center gap-2 sm:gap-10">
            @for (image of images(); track $index) {
            <div class="image bg-2 shadow-2xl shadow-gray-900 text-center rounded-lg"
                [ngClass]="{'checked-image': isChecked($index)}">
                <label class="sm:w-37.5 p-3 block cursor-pointer ">
                    <img class="w-full aspect-square cursor-pointer rounded-lg object-cover" [src]="'/images/' + image"
                        [alt]="image">
                    <input formControlName="{{ $index }}" type="checkbox" class="hidden">
                </label>
            </div>
            }
        </div>
        @if (form.invalid) {
        <app-error-alert [message]="form.getError('error')" />
        }
        <app-navigate-button />
    </form>
</section>
